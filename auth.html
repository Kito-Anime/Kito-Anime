<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập - Đăng kí</title>
<link rel="stylesheet" href="auth.css">
</head>

<body>

<div class="bg"></div>

<div class="container">

<h1>Kito Anime</h1>

<div class="tabs">
<button id="tabLogin" class="active">Đăng nhập</button>
<button id="tabSignup">Đăng kí</button>
</div>

<div class="forms">

<!-- LOGIN -->

<div id="loginForm" class="form active">

<h2>Đăng nhập</h2>

<input id="loginEmail" type="email" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Mật khẩu">

<button id="loginBtn">Đăng nhập</button>

<p class="switchText">
Chưa có tài khoản? 
<a id="toSignup">Đăng kí</a>
</p>

</div>

<!-- SIGNUP -->

<div id="signupForm" class="form">

<h2>Đăng kí</h2>

<input id="signupEmail" type="email" placeholder="Email">
<input id="signupPassword" type="password" placeholder="Mật khẩu">

<button id="signupBtn">Tạo tài khoản</button>

<p class="switchText">
Đã có tài khoản? 
<a id="toLogin">Đăng nhập</a>
</p>

</div>

</div>

<p id="msg"></p>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
