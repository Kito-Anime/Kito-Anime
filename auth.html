<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Đăng nhập - Đăng kí</title>
<link rel="stylesheet" href="auth.css">
</head>

<body>

<div class="auth-container">

<div class="auth-card">

<h1 class="logo">Kito Anime</h1>

<div class="tab-switch">
<button id="loginTab" class="active">Đăng nhập</button>
<button id="signupTab">Đăng kí</button>
</div>

<div class="form-area">

<form id="loginForm" class="form active">

<input id="loginEmail" type="email" placeholder="Email" required>
<input id="loginPassword" type="password" placeholder="Mật khẩu" required>

<button type="button" id="loginBtn">Đăng nhập</button>

</form>

<form id="signupForm" class="form">

<input id="signupEmail" type="email" placeholder="Email" required>
<input id="signupPassword" type="password" placeholder="Mật khẩu" required>

<button type="button" id="signupBtn">Đăng kí</button>

</form>

</div>

<p id="msg"></p>

</div>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
