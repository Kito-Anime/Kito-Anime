<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập - Đăng kí</title>
<link rel="stylesheet" href="auth.css">
</head>

<body>

<div class="bg"></div>

<div class="container">

<h1>Kito Anime</h1>

<div class="auth-switch">
<button id="btnLogin">Đăng nhập</button>
<button id="btnSignup">Đăng kí</button>
</div>

<div class="form" id="formBox">

<h2 id="formTitle">Đăng nhập</h2>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Mật khẩu">

<button id="submitBtn">Đăng nhập</button>

<p class="switchText">
<span id="switchLabel">Chưa có tài khoản?</span>
<a id="switchLink">Đăng kí</a>
</p>

<p id="msg"></p>

</div>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
